# ============================================================================
# TEST FIXTURE — load with load_server_config("tests/fixtures/server.yaml")
# ============================================================================
# This is the canonical server config for GPU / integration / contract tests.
# It mirrors configs/server.yaml.example option-for-option (parity-asserted in
# tests/server/test_config_parity.py) but pins values for deterministic test
# runs:
#
#   * model: mistral
#     - Mistral 7B is the validated production model. All contract-test
#       thresholds are calibrated against it. DO NOT change without
#       re-running every threshold-bearing test under --gpu.
#
#   * services that need network or external models: enabled: false
#     - SOTA agents, HA tools, speaker (pyannote), STT, TTS — all off so
#       tests run without API keys, model downloads, or daemons.
#
#   * ports: shifted by 10000 (8420 -> 18420, 10300 -> 19300, 10301 -> 19301)
#     - Lets the test fixture coexist with a live server during development.
#
# When you need different values for a specific test, override at construction
# time (cfg.consolidation.mode = "simulate") rather than editing this file.
# Editing this file ripples to every test that loads it.
#
# Lint guard: tests/test_test_config_loader_usage.py forbids tests from
# loading configs/server.yaml.example as their model fixture (it drifts).
# ============================================================================
#
# Original operator-facing comments below this line. Update them in
# configs/server.yaml.example first; sync key changes here via the parity
# test.
# ============================================================================

# ============================================================================
# CLOUD-ONLY INFERENCE — PRIVACY OPT-OUT
# ============================================================================
# When true, ParaMem routes EVERY query to the configured SOTA cloud agent
# instead of the local parametric-memory model.
#
# SECURITY IMPLICATIONS
# - Personal knowledge (conversations, preferences, relationships, schedules,
#   health, finances) is transmitted to a third-party model provider and
#   subject to their retention, logging, and training policies.
# - Once sent, data cannot be recalled. Providers may retain prompts for
#   abuse monitoring even when opt-out flags are set.
# - This setting OVERRIDES ParaMem's primary privacy guarantee for
#   conversation content — no local redaction layer intervenes.
#
# SCOPE
# - Routing only. Local extraction and consolidation continue to run against
#   captured transcripts, so the local memory stays warm if the user
#   toggles this flag back off in the future.
#
# QUALITY CONSIDERATIONS (self-bias risk)
# - If your extraction pipeline uses the SAME cloud model/provider that will
#   answer inference queries, the LLM-judge stages (noise_filter,
#   plausibility, ner_check, anonymization verify) become
#   "model-as-judge-for-itself": the judge rates its own outputs, confirming
#   its own biases and systematically over- or under-filtering certain
#   fact classes. Expected quality degradation.
# - Mitigation: disable the LLM-judge stages (`extraction.*` toggles below)
#   OR route them to a different provider than the inference agent.
#
# Default is false. Change to true ONLY if you have explicitly decided to
# trust the configured SOTA provider with your household's personal data.
# Takes precedence over the `--cloud-only` CLI flag.
# ============================================================================
cloud_only: false

# ============================================================================
# HEADLESS BOOT — AUTO-START WITHOUT USER LOGIN
# ============================================================================
# When true, the server reconciles two OS-level settings on every startup so
# the ParaMem stack comes up after a full machine reboot without any user
# login:
#
#   1. systemd user linger    — `loginctl enable-linger $USER`
#      Makes the user's systemd manager (and therefore paramem-server.service)
#      start at boot instead of at first login. Requires sudo.
#
#   2. Windows scheduled task — `ParaMem-Start-WSL-Boot` (WSL hosts only)
#      Runs `wsl.exe -d <distro> -u <user> --exec /bin/true` at Windows
#      startup to trigger the WSL2 VM before any interactive Windows login.
#      Runs as SYSTEM — requires a one-time UAC approval when created.
#
# Reconciliation happens in `scripts/setup/headless-boot.sh`, invoked by
# `scripts/server/start-server.sh` right after the port-forward step. The
# script compares desired state (this flag) to current state and applies or
# reverses as needed. It is non-fatal: if elevation (sudo / UAC) is not
# available in the current context, it WARNs with the exact command to run
# and lets the server start anyway.
#
# Caveats
# - Initial transition requires an interactive session (TTY for sudo, Windows
#   desktop for UAC). Edit this flag, then run `bash
#   scripts/server/start-server.sh` or `bash scripts/setup/headless-boot.sh`
#   once from a terminal to apply.
# - On non-WSL hosts only the linger half is reconciled — step 2 is skipped.
# - Flipping this flag back to false reverses both steps on the next startup.
# ============================================================================
headless_boot: false

server:
  host: "0.0.0.0"
  port: 8420                    # tests use TestClient (in-process ASGI) — no socket bound; matches example for fixture/example parity
  reclaim_interval_minutes: 10  # how often to check if GPU is free for auto-reclaim

model: mistral  # mistral | gemma | qwen3b | gemma4

debug: true   # dev-test posture: full diagnostic artefacts (per-session graph dumps, cycle
              # snapshots, JSONL transcripts) under paths.debug for failure triage. Safe because
              # paths.* below all route into tests/fixtures/sandbox/ — no live-store pollution.
              # Run-scoped under run_<id>/cycle_<N>/ so successive ConsolidationLoop instances
              # do not clobber each other's artefacts.

# --- Paths (mount points) ---
# All paths route into a gitignored sandbox directory so tests that don't override paths
# never write to the live store. Tests that need per-test isolation continue to use
# pytest's tmp_path; the sandbox only catches tests that aren't path-aware.
paths:
  data: tests/fixtures/sandbox/data/ha                # persistent artifacts (adapters, registry, key_metadata)
  sessions: tests/fixtures/sandbox/data/ha/sessions    # conversation transcripts pending consolidation
  debug: tests/fixtures/sandbox/data/ha/debug          # cycle snapshots, diagnostic output (debug=true)
  prompts: configs/prompts                              # extraction and voice prompt templates (read-only, shared with live)
  telemetry: tests/fixtures/sandbox/data/ha/telemetry  # bounded fold VRAM/adapter telemetry ring (always written)

adapters:
  episodic:
    enabled: true
    rank: 8
    alpha: 16
    learning_rate: 1.0e-4
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]   # attention-only: indexed-key retrieval is routing, not representation
  semantic:
    enabled: true
    rank: 8
    alpha: 16
    learning_rate: 1.0e-5
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]   # attention-only (same as episodic) — consolidated knowledge routing
  procedural:
    enabled: true       # behavioral patterns, routines, preferences (F5.6)
    rank: 8
    alpha: 16
    learning_rate: 5.0e-5
    # MLP targeting is load-bearing: behavioral patterns (style, formatting,
    # preferences) live in feed-forward layers. Attention-only would limit
    # procedural learning to routing, not representational change. Spelled
    # out explicitly so the architectural intent is visible — the loader
    # merges this from the factory default at config.py:1118-1134 when
    # omitted, but the yaml is the contract for load-bearing fields.
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# ============================================================================
# CONSOLIDATION — MEMORY TIER LIFECYCLE
# ============================================================================
# ParaMem has two memory tiers:
#   * Main adapters (episodic / semantic / procedural) — long-term
#     consolidated knowledge, refreshed on the full consolidation cycle.
#   * Interim adapters (episodic_interim_YYYYMMDDTHHMM) — short-lived
#     per-window buckets that absorb new facts between full consolidations
#     so recall is possible without waiting a full cycle.
#
# THE ONLY SCHEDULING KNOB — refresh_cadence
# - `refresh_cadence` is how often a NEW interim adapter is minted (the
#   interim tick interval). Grammar: "every Nh" / "every Nm" / "HH:MM"
#   (daily) / "daily" / "" (manual only, no timer).
# - The FULL consolidation period is DERIVED, not configured:
#       full_cycle = refresh_cadence × max_interim_count
#   Exception: when max_interim_count=0 (full-fold-only consume-pending
#   mode, no interim adapters) the full-cycle period equals refresh_cadence
#   itself — not refresh_cadence × 0.
#   Example (default): refresh_cadence="12h", max_interim_count=7
#       → full consolidation every 84h (3.5 days), with at most 7
#         concurrent interim adapters before the cycle fires.
# - At each interim tick a new adapter episodic_interim_<stamp> is created
#   (activity-gated) and trained. No rolling eviction — adapters accumulate
#   until the full cycle, which collapses them into the mains via replay
#   and deletes them. Cycle latency can distribute over time via
#   BackgroundTrainer's pause/resume — it yields to inference and resumes
#   when idle.
#
# SUSPEND / POWER-OFF CATCH-UP
# - A tick missed while the host was suspended (or powered off) is caught
#   up on resume for every cadence, including non-divisor ones like "5h" or
#   "90m" — not just cadences that divide evenly into a day/hour. Cadences
#   that DON'T divide evenly render as a coarser systemd calendar "heartbeat"
#   wakeup; a durable last-attempt stamp (not the timer itself) decides
#   whether a given wakeup actually runs a cycle.
# - systemd coalesces many missed elapses into ONE activation — "performed
#   on resume" means one catch-up run, not one per missed window.
# - The first gated tick after a fresh install (or an upgrade from a
#   version without this stamp) seeds the stamp and does NOT run — a
#   surprise consolidation on first boot is worse than a one-tick delay.
#
# INTERIM ADAPTER CAP — max_interim_count / interim_overflow_slack
# - HARD CAP on concurrent interim adapters resident in VRAM.
# - Each interim adapter is its own independently-trained, temporally-
#   ordered slot. No adapter ever absorbs another's facts; the full fold
#   collapses all interim slots into the mains via replay, then deletes them.
# - If more facts arrive after the ring is full (full cycle late or skipped):
#   * With interim_overflow_slack > 0: up to max_interim_count + slack
#     later-stamped overflow slots are minted — each its OWN ordered adapter;
#     existing adapters are NEVER mutated or retrained. Emits a loud
#     interim_cap_reached warning incident.
#   * Beyond max_interim_count + slack (and at the default slack=0): new
#     sessions are kept PENDING (losslessly re-extracted next cycle) until
#     the next full consolidation drains the ring. Emits an
#     interim_overflow_pending incident.
# - Startup VRAM validator refuses to start if base + main adapters +
#   max_interim_count + interim_overflow_slack + staging + KV cache exceeds
#   the configured GPU budget.
#
# ACTIVITY GATING
# - At each interim tick, if no new session transcripts AND no queued
#   pending triples since the last tick, the tick is a no-op — no new
#   adapter is created, no training runs.
# - After extraction, duplicate triples are filtered by the graph merger
#   (idempotent on subject/predicate/object); no new knowledge → no training.
# - Result: adapter VRAM and router probe cost scale with real conversation
#   volume, not wall clock.
#
# RECALL LATENCY — INTENTIONAL
# - A fact spoken at 14:00 under refresh_cadence="12h" may not be recallable
#   from parametric memory until the next tick boundary. In-conversation
#   context still carries the fact via the conversation buffer;
#   cross-conversation recall inside the refresh window falls back to the
#   pending-queue or SOTA path.
# - Rationale: if the user immediately consumes the answer, they rarely ask
#   again within the refresh window. Facts that matter ("my daughter's play
#   is tomorrow", "I prefer jazz at dinner") are either already in
#   conversation context or benefit from consolidating over multiple
#   exposures. Shorten refresh_cadence only after confirming the startup
#   validator still passes for your GPU budget.
#
# VRAM envelope is proven at startup from
#   rank × target_modules × (main_count + max_interim_count + 1 staging)
#   × base_model_size.
# Server refuses to start if the configured topology exceeds the GPU.
# ============================================================================
consolidation:
  refresh_cadence: "12h"       # "every Nh" / "every Nm" / "HH:MM" / "daily" / "" (manual)
                               # 12h + max_interim_count=7 → full cycle every 84h (derived).
  mode: train                  # "train" persists to LoRA weights; "simulate" persists graph.json under adapter_dir/<tier>/ (no weight training)
                               # Closed vocabulary: any other value is rejected at config load.
                               # "simulate" + max_interim_count: 0 is also rejected (no training venue at all).
  promotion_threshold: 3       # reinforcement_count threshold for key promotion to semantic
  retain_sessions: true        # archive transcripts after consolidation (false = delete)
  indexed_key_replay: true     # indexed key training mechanism
  decay_window: 10             # cycles before unreinforced keys decay
  sota_enabled: true            # dev-test posture: exercise SOTA code paths (cloud calls fall through when API key unset)
  refinement_enrichment: "on"   # graph-stage SOTA enrichment — on in tests; requires sota_enabled:true
  refinement_normalization: "on"  # full-fold predicate-synonym collapse (per-group cluster model call); local-7B precision ~0.89 accepted
  refinement_contradiction: "on"  # Case-2 recency-backed contradiction: freshest last_seen wins; empty/tied → coexist. off|on.
  recall_sanity_threshold: 1.0  # minimum recall fraction (0, 1] for all recall gates; 1.0 = sharp (all keys must be recalled)
  consolidation_retry_cap: 3    # cycles a session stays pending on recall-gate failure or DEGENERATE outcome before being released; ABORT does not count
  min_tier_key_floor: 30
  tier_fast_start: true
  # max_epochs: ceiling for LoRA training epochs per consolidation cycle.
  # Unset (or null) → use the validated 30-epoch default from the Test 1-8
  # campaign. Lower this only with empirical recall-vs-epochs evidence on
  # your specific base model — 30 was validated on Mistral 7B and may be
  # overkill on future base models. With recall_early_stopping=true, this
  # becomes the upper bound; with the flag off, this is the fixed budget.
  # max_epochs: null
  # Recall-based early stopping — flipped ON 2026-05-06 for the first
  # production cycle.  signal_from_epoch=20 is a conservative floor
  # given Test 14's multi-seed cells stopped between e18-e26.
  recall_early_stopping: true
  recall_window: 2
  recall_probe_every_n_epochs: 3
  recall_signal_from_epoch: 20
  recall_probe_batch_size: 16       # matches server.yaml.example; per-test overrides go in code
  extraction_max_tokens: 8192  # output-token budget — must match server.yaml.example to avoid silent truncation in simulate-mode probes (gated by tests/server/test_config_parity.py)
  extraction_plausibility_max_tokens: 8192  # plausibility-stage cap — must match server.yaml.example (parity-gated)
  calibrate_endpoint_enabled: false  # opt-in dev tool; off in tests by default
  extraction_ha_validation: true  # validate locations against HA home context
  extraction_noise_filter: anthropic  # dev-test posture: exercise SOTA enrichment code paths. Cloud calls fall through gracefully when ANTHROPIC_API_KEY is unset.
  extraction_noise_filter_model: claude-sonnet-4-6  # model for noise filtering
  extraction_noise_filter_endpoint: ""  # custom endpoint for OpenAI-compatible providers ("" = use the provider's default endpoint)
  # --- Extraction-pipeline stages (all configurable) ---
  #
  # Plausibility filter — final quality gate on extracted facts.
  #
  # Recommended default: local judge (`auto`) at the `deanon` stage.
  #   * Zero cloud cost. Privacy-safe (real names stay local).
  #   * Cross-family by construction (local model != cloud enricher).
  #
  # Alternative: SOTA judge at the `anon` stage (e.g. `claude`).
  #   * Higher judgment quality. Paid.
  #   * Runs on anonymized facts + anonymized transcript — cloud-safe.
  #   * IMPORTANT: pick a family DIFFERENT from the enricher to avoid
  #     same-family bias. Enricher=Claude -> judge with a non-Anthropic
  #     provider (or stay local).
  #
  # `auto` => use the same local model that performed extraction.
  # `off`  => disable plausibility entirely (not recommended).
  extraction_plausibility_judge: auto
  extraction_plausibility_stage: deanon         # "anon" | "deanon"

  extraction_verify_anonymization: true         # forward-path privacy guard (do not disable)
  extraction_ner_check: false                   # optional spaCy PII cross-check
  extraction_ner_model: en_core_web_sm          # spaCy model when ner_check=true
  # Local, privacy-preserving STT spelling repair (paramem/graph/entity_correction.py).
  # Runs entirely on-device on the anonymization *reverse map*: misheard real names
  # (e.g. "Frankfrut" -> "Frankfurt") are fixed in place before de-anonymization, so
  # nothing extra ever leaves the machine — the cloud enrichment stage still sees only
  # anonymized placeholders (City_1, Org_1, ...), never these real surfaces. Lists the
  # anonymizer entity types eligible for correction; empty list ([]) turns it off.
  # "person" is excluded by default: a private individual's name is not world-knowledge-
  # correctable, and rewriting it risks corrupting a real identity — person spelling is
  # owned by the local enrollment/voice-profile flow. The "attributes" member also
  # corrects in-scope misspellings stored in entity attributes (e.g. current_location),
  # not just relation surfaces; person-name and non-entity attribute values are excluded
  # by the model's own kind classification.
  extraction_correction_entity_types: [place, organization, concept, attributes]
  # Max concurrent interim adapters in VRAM. Together with refresh_cadence
  # this determines the derived full-consolidation period:
  #     full_cycle = refresh_cadence × max_interim_count
  # Default 7 + "12h" refresh → 84h full cycle. Validated at startup —
  # server refuses to start if base + mains + this + staging + KV exceeds
  # the configured GPU budget. Raise only after re-running the validator.
  max_interim_count: 7
  # Overflow slots beyond the max_interim_count ring before keep-pending
  # kicks in. Default 0 = sessions are kept pending immediately when the ring
  # is full. > 0 = temporarily mint up to that many extra later-stamped overflow
  # slots before keep-pending (each its own ordered adapter; VRAM budget proven
  # at startup using max_interim_count + interim_overflow_slack).
  interim_overflow_slack: 0
  # Thermal throttle: keeps the machine silent during background training.
  # Training pauses when GPU temp exceeds the limit and resumes when it cools.
  # Set to 0 to disable. Adjust to match your fan ramp-up threshold.
  training_temp_limit: 55      # GPU temp ceiling in °C (0 = disabled)
  training_temp_check_interval: 5  # check GPU temp every N training steps
  # Quiet-hours policy — schedules *when* the thermal throttle above applies.
  # Two realistic deployment shapes:
  #   * Server-room host (rack, cellar PC, NAS) — nobody listens, just set
  #     `quiet_hours_mode: always_off` and let fans spin 24/7.
  #   * Daytime-used laptop/PC (work, study, shared living space) — silent at
  #     the desk during the day, free to spin overnight. Default below.
  #   "always_on"  — throttle 24/7
  #   "always_off" — throttle never (server rack, cellar)
  #   "auto"       — throttle only inside [start, end] (wraps past midnight)
  quiet_hours_mode: auto
  quiet_hours_start: "07:00"
  quiet_hours_end: "22:00"
  entity_similarity_threshold: 85.0        # rapidfuzz token_sort_ratio minimum (0-100)
  # --- Graph-level SOTA enrichment neighborhood knobs ---
  graph_enrichment_neighborhood_hops: 2      # N-hop ego-graph radius per focal entity
  graph_enrichment_max_entities_per_pass: 50 # max nodes per SOTA chunk call
  # RAM-mode checkpointing. Mirrors server.yaml.example (same values required
  # for fixture/example parity). Per-test overrides go in code.
  training_save_steps_ram: 0
  # Post-promotion slot retention: mirrors server.yaml.example.
  training_keep_prior_slots: 3
  # Idle debounce: mirrors server.yaml.example.
  training_idle_debounce_s: 30
  # /chat abort-quiesce timeout: mirrors server.yaml.example.
  abort_quiesce_timeout_s: 30.0
  # Holdable-session retirement TTL — mirrors server.yaml.example.
  orphan_retirement: "off"
  # --- LoRA training hyperparameters (Test 17 recipe; formerly an in-code default) ---
  # num_epochs is the ceiling `max_epochs` above (None -> 30); not repeated here.
  training_batch_size: 1
  training_gradient_accumulation_steps: 2
  training_max_seq_length: 1024
  training_warmup_steps: 30          # fixed steps; overrides warmup_ratio when > 0
  training_warmup_ratio: 0.0         # explicit 0.0 so the TrainingConfig default (0.1) cannot leak
  training_lr_scheduler_type: linear
  training_weight_decay: 0.1
  training_gradient_checkpointing: true
  training_max_grad_norm: 1.0
  training_seed: 42
  training_lr_decay_steps: null

# --- Agents ---
# PA (local model) handles personal knowledge. HA agent handles tool use.
# SOTA is the fallback for general reasoning when HA cannot answer.
#
# All cloud agents ship disabled. To enable, set the relevant API key env var
# (ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY) and flip enabled: true.
# The ${VAR} placeholders below document the surface; they are resolved at
# load time.
agents:
  # Dev-test posture: SOTA agents enabled so escalation routing code paths are
  # exercised. Cloud calls fall through gracefully when API keys are unset
  # (the loader logs and skips). Tests that need real SOTA responses are
  # marked `integration` and require keys.
  sota:
    enabled: true
    provider: anthropic
    model: claude-sonnet-4-6
    api_key: ${ANTHROPIC_API_KEY}
    endpoint: ""
    timeout_seconds: 90.0
  sota_providers:
    anthropic:
      enabled: true
      provider: anthropic
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY}
      timeout_seconds: 90.0
    openai:
      enabled: true
      provider: openai
      model: gpt-4o-search-preview
      api_key: ${OPENAI_API_KEY}
      timeout_seconds: 90.0
    google:
      enabled: true
      provider: google
      model: gemini-2.5-flash
      api_key: ${GOOGLE_API_KEY}
      timeout_seconds: 90.0
  # HA escalation kept off here: integration tests (scripts/dev/test-ha-pipeline.sh
  # and friends) exercise HA against a real instance. Unit/contract tests stay off
  # the HA path. Flip per-test if a unit test needs to assert HA routing.
  ha_agent_id: ""

# --- Tools ---
tools:
  ha:
    url: ${HA_URL}                # e.g. http://homeassistant.local:8123
    token: ${HA_TOKEN}
    auto_discover: true
    supported_languages: [en, de, fr, es]  # languages HA conversation agent accepts
    allowlist:
      - light.*
      - switch.*
      - script.*
      - climate.*
      - media_player.*
  tool_timeout_seconds: 10.0

# ============================================================================
# SANITIZATION & CLOUD EGRESS POLICY
# ============================================================================
# Two layered knobs control what happens to cloud-bound text:
#
#   `mode`        — sanitizer detection layer
#                     off    : no PII detection, queries flow through unchanged
#                     warn   : log findings, queries flow through unchanged
#                     block  : null-return personal-marker queries, suppressing
#                              the cloud call at the first checkpoint
#
#   `cloud_mode`  — egress policy for direct SOTA escalation
#                     block      : PERSONAL queries dropped before SOTA;
#                                  non-PERSONAL sent verbatim. Phase 2 default,
#                                  zero anonymizer cost, smallest cloud surface.
#                     anonymize  : ALL cloud-bound text is anonymized via the
#                                  local LLM, sent to SOTA as placeholders, and
#                                  de-anonymized on the way back. PERSONAL
#                                  queries reach cloud as redacted text.
#                     both       : strictest privacy posture — PERSONAL is
#                                  blocked AND non-PERSONAL is anonymized.
#                                  Cloud only ever sees non-personal text, and
#                                  even that is placeholder-substituted.
#
# Per-query safety: in any anonymizing mode, if the leak guard detects a real
# name surviving anonymization, that single query falls back to block (config
# stays put for the next query).
#
# HA path (HA conversation agent) is NOT affected by `cloud_mode`. HA receives
# cleartext, gated by intent classification. Hardening the HA hop is a planned
# follow-up package.
#
# SOTA reachability is independent: with `agents.sota.enabled: false` (or no
# api_key), no queries reach SOTA regardless of `cloud_mode`.
sanitization:
  mode: block            # off | warn | block — PII detection layer
  cloud_mode: anonymize  # block | anonymize | both — direct-SOTA egress policy
  cloud_scope:           # NER categories to anonymize when cloud_mode=anonymize|both ([] = off)
    - person

# ============================================================================
# ABSTENTION — LAST-RESORT CONFABULATION GUARD
# ============================================================================
# When all of the following hold simultaneously:
#   * no local parametric-memory match (adapter has no relevant fact)
#   * no Home Assistant entity match
#   * the sanitizer blocked cloud escalation (query is self-referential /
#     personal — e.g. "Where do I live?", "What's my birthday?")
# ...the server would otherwise fall through to the bare base model with no
# context. That path confabulates confident personal data (observed:
# untrained adapter + "Where do I live?" → "New York City").
#
# When enabled, the server returns `response` verbatim instead of invoking
# the base model. Deterministic, zero hallucination risk on the last-resort
# branch.
#
# Prompt-only abstention at 7B-9B is unreliable (AbstentionBench, NeurIPS
# 2025) — a deterministic short-circuit is the only fix that does not leak
# confabulated personal data on the sanitizer-blocked path. Disable only if
# a downstream layer handles the empty-knowledge case without confabulation.
# ============================================================================
abstention:
  enabled: true
  # Messages live in dedicated prompt files so they can be tuned without
  # code changes — same pattern as voice.prompt_file. The *_override
  # fields take precedence when set; an empty override falls back to the
  # file, and a missing file falls back to a module-level constant in
  # paramem/server/config.py.
  response_file: configs/prompts/abstention_response.txt
  cold_start_response_file: configs/prompts/abstention_cold_start.txt
  # response_override: "..."             # uncomment to pin inline
  # cold_start_response_override: "..."  # uncomment to pin inline

# Intent classifier — residual classifier for routing decisions.  State
# signals (graph match, HA match) decide cleanly when present; the
# encoder-backed cosine router resolves the residual.  Every knob is an
# operator-tunable: encoder model, device, exemplars directory,
# confidence threshold, and the fail-closed default intent.  Whatever
# encoder/dataset is best today may be outdated tomorrow — operators
# can swap without code changes.
intent:
  enabled: true                                   # local-only; encoder downloads from HF on first use (~250MB)
  mode: llm                                       # embeddings | llm — see server.yaml.example for trade-offs
  encoder_model: intfloat/multilingual-e5-small  # any sentence-transformers-compatible HF model
  encoder_device: auto                            # auto | cuda | cpu
  encoder_dtype: float16                          # float16 | float32
  encoder_query_prefix: "query: "                 # E5 family requires this; empty for other models
  exemplars_dir: configs/intents
  confidence_margin: 0.05                         # min top1-top2 margin; below → fail_closed_intent
  fail_closed_intent: personal                    # privacy-preserving default on uncertainty
  llm_max_new_tokens: 8                           # cap on classifier generate() output — one label
  llm_temperature: 0.0                            # deterministic; required for structured output

# Sentence-type classifier: INTERROGATIVE / NON_INTERROGATIVE.  Reuses
# the multilingual encoder loaded by `intent` above.  Used by the
# abstention helper to gate canned-response short-circuits.  Below
# the margin or with encoder unavailable the routing path falls back
# to a deterministic punctuation + English first-word lexicon
# heuristic.
sentence_type:
  enabled: true
  exemplars_dir: configs/sentence_types
  confidence_margin: 0.05

# Personal-referent classifier: ABOUT_SPEAKER / NOT_ABOUT_SPEAKER.
# Reuses the multilingual encoder loaded by `intent` above.  Used by
# the cloud-egress sanitizer's first-person check.
personal_referent:
  enabled: true
  exemplars_dir: configs/personal_referent
  confidence_margin: 0.05

voice:
  prompt_file: configs/prompts/pa_voice.txt
  greeting_interval_hours: 24  # hours between greetings per speaker (0 = disabled)
  # Per-language greetings (period: morning|afternoon|evening), prepended in the
  # detected language; unknown languages fall back to "en". Operator-editable.
  greetings:
    en: {morning: "Good morning", afternoon: "Good afternoon", evening: "Good evening"}
    de: {morning: "Guten Morgen", afternoon: "Guten Tag", evening: "Guten Abend"}
    fr: {morning: "Bonjour", afternoon: "Bon après-midi", evening: "Bonsoir"}
    es: {morning: "Buenos días", afternoon: "Buenas tardes", evening: "Buenas noches"}

session:
  idle_timeout_minutes: 10  # gap since a conversation's last turn after which the next turn opens a fresh session

speaker:
  enabled: false  # voice-based speaker identification via pyannote (requires pyannote install + HF auth token)
  high_confidence_threshold: 0.60  # confirmed match (cross-device centroid)
  low_confidence_threshold: 0.45   # tentative match, no interruption
  enrollment_prompt: "By the way, I don't think we've met yet. Please introduce yourself with your next request."
  enrollment_reprompt_interval: 600  # seconds between re-prompting unknown speakers
  min_embedding_duration_seconds: 1.0  # discard embeddings from utterances shorter than this; pyannote needs sustained voice
  max_embeddings_per_profile: 50     # cap on stored embeddings per speaker
  redundancy_threshold: 0.95         # skip enrichment if similarity to centroid exceeds this
  grouping_threshold_factor: 0.6     # unknown grouping = low_threshold * this factor
  # store_path: ""                 # default: data/ha/speaker_profiles.json

stt:
  enabled: false             # local Whisper STT via Wyoming protocol (requires faster-whisper + GPU model download)
  model: distil-large-v3     # GPU model: distil-large-v3, large-v3, etc.
  cpu_fallback_model: small  # multilingual CPU model for cloud-only mode (distil-* variants are English-only)
  device: cuda               # cuda, cpu, auto
  compute_type: int8         # int8, float16, float32
  port: 10300                # tests use Wyoming clients in-process; matches example for fixture/example parity
  language: auto             # "auto" for multilingual detection, or fixed code (e.g. "en")
  beam_size: 5               # Whisper beam search width (higher = better, slower)
  vad_filter: true           # voice activity detection (trims silence)

tts:
  # Whether ParaMem runs its OWN local Wyoming TTS engine. false does NOT mean
  # "no TTS in the system" — replies can still be voiced by an external TTS
  # (e.g. a Home Assistant pipeline); /chat and STT are unaffected either way.
  enabled: false             # local Wyoming TTS engine on/off (Piper / MMS model downloads)
  port: 10301                # tests use Wyoming clients in-process; matches example for fixture/example parity
  # DEFAULT DEVICE = cpu. Piper is CPU-first (real-time on CPU) and keeping the
  # voices off the GPU preserves VRAM for the base model + Whisper STT. Override
  # per-voice with `device: cuda` only where the GPU is worth it (e.g. MMS/VITS,
  # slow on CPU). This example/test config keeps everything on CPU.
  device: cpu
  default_language: en
  language_confidence_threshold: 0.8  # Whisper detection probability to trust
  language_source: auto               # auto/detection: detected language wins over caller hint; hint: reverse
  # model_dir: ""            # TTS model storage; default: data/ha/tts
  voices:
    en:
      engine: piper
      model: en_US-lessac-high
    de:
      engine: piper
      model: de_DE-thorsten-high
    fr:
      engine: piper
      model: fr_FR-siwis-medium
    es:
      engine: piper
      model: es_ES-davefx-medium
    tl:
      engine: mms
      model: facebook/mms-tts-tgl
      device: cuda             # mirrors the operator max-config (MMS/VITS on GPU)

# ============================================================================
# TEXT-SIDE LANGUAGE DETECTION (fastText lid.176)
# ============================================================================
# Disabled in the test fixture so CI does not require the 126 MB model file.
# Production deployments turn this on after running
# scripts/setup/download-langid-model.sh.
text_lang_detection:
  enabled: false
  confidence_threshold: 0.65
  # model_path: ""

mobile_pwa:
  enabled: false
  static_dir: ""
  cookie_name: "paramem_token"
  push_enabled: false
  vapid_contact: "mailto:admin@localhost"

# ============================================================================
# PROCESS
# ============================================================================
process:
  restart:
    on_failure: true
    interval_seconds: 30
    max_attempts: 3
    window_seconds: 60
    permanent_failure_exit_codes: [3]

# ============================================================================
# VRAM
# ============================================================================
# Process-side memory safety net. Sets
# torch.cuda.set_per_process_memory_fraction(process_cap_fraction) at server
# startup so PyTorch raises OutOfMemoryError when allocations would push past
# the cap, instead of letting the host GPU driver fault. On WSL2 a host-side
# fault collapses the entire VM; the cap converts that into a clean Python
# exception that the consolidation guard turns into a per-phase abort.
#
# Reserve ~15 % of device VRAM by default (8 GiB → 1.2 GiB headroom for OS
# and any non-paramem GPU consumer). Lower if other processes share the
# device; raise cautiously, only after measuring.
# ============================================================================
# Inference path
# ============================================================================
# Default true: serve indexed-key recall from the RAM cache (single
# model.generate for reasoning).  Flip to false to validate parametric
# recall against adapter weights (one model.generate per key).
inference:
  preload_cache: true

vram:
  process_cap_fraction: 0.85           # in (0, 1]; rejected at startup otherwise
  vram_cache_headroom_gib: 1.5         # Per-phase peak; vram_scope releases the KV pool between extraction phases. (1.5 GiB: single-sequence 8192-token Mistral KV cache is ~1 GiB; 0.5 GiB margin for activations.)
  baseline_vram_gib: 8                 # Nominal deployment-target GPU VRAM in GiB.
  nf4_disk_to_runtime_factor: 0.275
  stt_workspace_factor: 1.1
  tts_piper_ort_context_mib: 300
  peft_overhead_per_adapter_mib: 10
  cuda_crashloop_burst: 2
  cuda_fault_history_window_s: 600
  cooldown_gate_threshold_c: 52
  cooldown_gate_poll_s: 5
  cooldown_gate_max_wait_boot_s: 60
  cooldown_gate_max_wait_fold_s: 300
  cooldown_gate_max_wait_inference_s: 30

# ============================================================================
# SECURITY
# ============================================================================
# Two independent areas under `security:`:
#
#   1. require_encryption — uniform startup gate.
#   2. backups            — retention + schedule for backup slots.
#
# ----------------------------------------------------------------------------
# require_encryption
# ----------------------------------------------------------------------------
# When true, the server refuses to start unless the daily age identity is
# loadable (PARAMEM_DAILY_PASSPHRASE set + ~/.config/paramem/daily_key.age
# present). The gate covers every feature that writes to disk: session
# snapshots, HF Trainer checkpoint shards, backup artifacts, and
# infrastructure metadata.
#
# Default (false) is AUTO everywhere: encrypt when a key is loaded, plaintext
# otherwise. Set to true when a misconfig must fail loud instead of
# silently producing plaintext on disk.
#
# ----------------------------------------------------------------------------
# backups.orphan_sweep
# ----------------------------------------------------------------------------
# max_age_hours bounds the look-back window for the migration-trial recovery
# path that runs at startup. A TRIAL marker older than this is not resumed.
# Unrelated .pending/ slots from crashed writes are always swept on startup
# regardless of this value.
#
# ----------------------------------------------------------------------------
# backups.retention
# ----------------------------------------------------------------------------
# Per-tier retention budget. Rules apply in this precedence (strongest first):
#   1. max_total_disk_gb — global cap across all tiers; new backups refused
#      when reached, DISK PRESSURE alert raised at 80% of cap.
#   2. per-tier max_disk_gb (e.g. manual) — same behaviour scoped to tier.
#   3. tier `keep` counts — oldest-within-tier pruned first.
#   4. pre_migration entries within last 30 days are immune from rule 3.
#   5. manual entries are immune from time + count pruning, subject to 1+2.
# Live A-backup slots referenced by state/trial.json are NEVER pruned while
# TRIAL is active (immunity is unconditional — outranks every rule).
#
# ----------------------------------------------------------------------------
# backups.schedule / backups.artifacts / backups.max_total_disk_gb
# ----------------------------------------------------------------------------
# schedule: "daily HH:MM" / "every Nh" / "every Nm" / "off". Same grammar as
# consolidation.refresh_cadence. "off" disables the scheduled backup timer
# (manual backups via the CLI still work).
#
# artifacts: subset of [config, graph, registry]. Each element becomes a
# slot directory under data/ha/backups/<artifact>/<ts>/.
#
# max_total_disk_gb: global cap. The retention engine enforces rules 2+3+4+5
# against this; the runner enforces rule 1 (write refusal at 100%).
#
# Defaults shown below. Uncomment to override.
# security:
#   require_encryption: false
#   backups:
#     orphan_sweep:
#       max_age_hours: 24
#     retention:
#       daily:         { keep: 7 }
#       weekly:        { keep: 4 }
#       monthly:       { keep: 12 }
#       yearly:        { keep: 3 }
#       pre_migration: { keep: 10 }
#       pre_base_swap: { keep: 10 }   # base-swap snapshot bundles; retention-immune 30d
#       trial_adapter: { keep: 5 }
#       manual:        { keep: "unlimited", max_disk_gb: 5 }
#     schedule: "daily 04:00"
#     artifacts: [config, graph, registry]
#     max_total_disk_gb: 20
