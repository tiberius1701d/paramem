server:
  host: "0.0.0.0"
  port: 8420

model: mistral  # mistral | gemma | qwen3b

adapter_dir: data/ha/adapters
registry_path: data/ha/registry.json
graph_path: data/ha/graph.json
session_dir: data/ha/sessions

adapters:
  episodic:
    enabled: true
    rank: 8
    alpha: 16
    learning_rate: 1.0e-4
  semantic:
    enabled: false      # enable for knowledge promotion (consolidation loop)
    rank: 24
    alpha: 48
    learning_rate: 1.0e-5
  procedural:
    enabled: false      # future — behavioral patterns, routines, preferences
    rank: 12
    alpha: 24
    learning_rate: 5.0e-5

training:
  epochs: 30

consolidation:
  schedule: "02:00"  # daily at this hour (empty string = manual only)

cloud:
  enabled: false
  endpoint: ""       # e.g. https://api.openai.com/v1/chat/completions
  model: ""          # e.g. gpt-4o
  api_key: ""

voice:
  system_prompt: >
    You are a personal memory assistant. Answer concisely in 1-2 spoken sentences.
    Do not use markdown, lists, or structured formatting.
    Speak naturally as if you simply remember.
    If you cannot answer a question from your knowledge, respond ONLY with
    [ESCALATE] followed by the question to forward.
